<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under The Scope - 9 POV Hub</title>
    <style>
        body { background: #080808; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { text-align: center; color: #ff8c00; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Cuadrícula mágica: 3 columnas de igual tamaño */
        .grid-9 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            max-width: 100vw;
        }

        .stream-card { 
            position: relative; 
            background: #000; 
            aspect-ratio: 16 / 9; 
            border: 1px solid #222;
        }

        iframe.video { width: 100%; height: 100%; border: none; }
        
        /* Overlay flotante pequeño para que quepa en 9 cuadros */
        iframe.overlay { 
            position: absolute; top: 5px; left: 5px; 
            width: 250px; height: 50px; border: none; 
            pointer-events: none; z-index: 10;
        }

        @media (max-width: 1000px) { .grid-9 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-9 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Under The Scope - Multi-POV (9)</h1>
    
    <div class="grid-9">
        <div class="stream-card">
            <iframe class="video" src="https://player.twitch.tv/?channel=CANAL_1&parent=TU_USUARIO.github.io&muted=true"></iframe>
            <iframe class="overlay" src="overlay.html?team=EQUIPO_1"></iframe>
        </div>

        <div class="stream-card">
            <iframe class="video" src="https://player.twitch.tv/?channel=CANAL_2&parent=TU_USUARIO.github.io&muted=true"></iframe>
            <iframe class="overlay" src="overlay.html?team=EQUIPO_2"></iframe>
        </div>

        </div>
</body>
</html>
