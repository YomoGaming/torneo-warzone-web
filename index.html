<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under The Scope - 9 POV Hub</title>
    <style>
        body { background: #080808; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { text-align: center; color: #ff8c00; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }
        
        .grid-9 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Esto crea las 3 columnas */
            gap: 15px; 
            max-width: 100vw;
        }

        .stream-card { 
            position: relative; 
            background: #1a1a1a; 
            aspect-ratio: 16 / 9; 
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        iframe.video { width: 100%; height: 100%; border: none; }
        
        iframe.overlay { 
            position: absolute; top: 8px; left: 8px; 
            width: 250px; height: 50px; border: none; 
            pointer-events: none; z-index: 10;
        }

        /* Ajuste para tablets: 2 columnas */
        @media (max-width: 1100px) { .grid-9 { grid-template-columns: repeat(2, 1fr); } }
        /* Ajuste para celulares: 1 columna */
        @media (max-width: 700px) { .grid-9 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Under The Scope - Multi-POV (9)</h1>
